services:
  - type: web
    name: project-manager-backend
    env: node
    buildCommand: npm install && cd server && npm install
    startCommand: node server/server.js
    envVars:
      - key: PORT
        value: 5001
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
